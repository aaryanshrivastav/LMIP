name: LMIP Pytest CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:  # Allow manual trigger

jobs:
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
      fail-fast: false  # Continue testing other versions even if one fails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'  # Cache pip dependencies
      
      - name: Install Java (required for PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist pytest-timeout pytest-html
      
      - name: Create test logs directory
        run: mkdir -p tests/logs
      
      - name: Run Pytest - Highest Risk Tests (CDC + Identity)
        run: |
          pytest -m "cdc or identity" \
            --junitxml=tests/reports/junit-highest-risk.xml \
            --html=tests/reports/report-highest-risk.html \
            --self-contained-html \
            --cov=LMIP \
            --cov-report=xml:tests/reports/coverage-highest-risk.xml \
            || echo "Highest risk tests failed"
      
      - name: Run Pytest - High Risk Tests (Sector + SCD2)
        run: |
          pytest -m "sector or scd2" \
            --junitxml=tests/reports/junit-high-risk.xml \
            --html=tests/reports/report-high-risk.html \
            --self-contained-html \
            || echo "High risk tests failed"
      
      - name: Run Pytest - Medium Risk Tests (Quarantine + Manifest)
        run: |
          pytest -m "quarantine or manifest" \
            --junitxml=tests/reports/junit-medium-risk.xml \
            --html=tests/reports/report-medium-risk.html \
            --self-contained-html \
            || echo "Medium risk tests failed"
      
      - name: Run Pytest - All Tests
        run: |
          pytest \
            --junitxml=tests/reports/junit-all.xml \
            --html=tests/reports/report-all.html \
            --self-contained-html \
            --cov=LMIP \
            --cov-report=xml:tests/reports/coverage-all.xml \
            --cov-report=html:tests/reports/coverage-html \
            --cov-report=term-missing
      
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if tests fail
        with:
          name: test-reports-py${{ matrix.python-version }}
          path: tests/reports/
          retention-days: 30
      
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'  # Only upload once
        with:
          files: ./tests/reports/coverage-all.xml
          flags: unittests
          name: lmip-coverage
          fail_ci_if_error: false  # Don't fail if codecov upload fails
      
      - name: Comment PR with Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: github.event_name == 'pull_request'
        with:
          files: tests/reports/junit-*.xml
          comment_title: 'Pytest Results - Python ${{ matrix.python-version }}'
          check_name: 'Test Results - Python ${{ matrix.python-version }}'
  
  test-quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Test Reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          path: test-reports
      
      - name: Check Critical Test Failures
        run: |
          # Fail CI if highest risk tests failed
          if [ -f test-reports/test-reports-py3.10/junit-highest-risk.xml ]; then
            failures=$(grep -o 'failures="[0-9]*"' test-reports/test-reports-py3.10/junit-highest-risk.xml | grep -o '[0-9]*')
            errors=$(grep -o 'errors="[0-9]*"' test-reports/test-reports-py3.10/junit-highest-risk.xml | grep -o '[0-9]*')
            
            if [ "$failures" -gt 0 ] || [ "$errors" -gt 0 ]; then
              echo "❌ CRITICAL: Highest risk tests (CDC + Identity) failed!"
              echo "Failures: $failures, Errors: $errors"
              exit 1
            else
              echo "✅ All highest risk tests passed"
            fi
          fi
      
      - name: Check Code Coverage Threshold
        run: |
          # Extract coverage percentage from XML report
          if [ -f test-reports/test-reports-py3.10/coverage-all.xml ]; then
            coverage=$(grep -o 'line-rate="[0-9.]*"' test-reports/test-reports-py3.10/coverage-all.xml | head -1 | grep -o '[0-9.]*')
            coverage_percent=$(echo "$coverage * 100" | bc)
            threshold=70.0
            
            echo "Code Coverage: ${coverage_percent}%"
            echo "Threshold: ${threshold}%"
            
            if (( $(echo "$coverage_percent < $threshold" | bc -l) )); then
              echo "⚠️ WARNING: Code coverage ${coverage_percent}% is below threshold ${threshold}%"
              # Don't fail CI, just warn
            else
              echo "✅ Code coverage meets threshold"
            fi
          fi

  test-matrix-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Generate Test Summary
        run: |
          echo "# LMIP Test Suite Results 🧪" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Python Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 3.10 | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3.11 | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Categories" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Highest Risk**: CDC Hash Logic, Identity Matching" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **High Risk**: Sector Assignment, SCD2 Key Generation" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Medium Risk**: Quarantine Routing, Export Bundle Manifest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed reports in the test artifacts." >> $GITHUB_STEP_SUMMARY

# ============================================================================
# CI Configuration Notes
# ============================================================================
# 
# Test Execution Strategy:
# 1. Run highest risk tests first (CDC + Identity)
# 2. Run high risk tests (Sector + SCD2)
# 3. Run medium risk tests (Quarantine + Manifest)
# 4. Run all tests for comprehensive coverage
#
# Quality Gates:
# - FAIL if highest risk tests fail (critical logic)
# - WARN if code coverage < 70%
# - UPLOAD test reports and coverage to artifacts
# - COMMENT on PRs with test results
#
# Manual Trigger:
# - Use "Run workflow" button in GitHub Actions tab
# - Select branch to test
#
# ============================================================================
