[pytest]
# ============================================================================
# LMIP Pytest Configuration
# ============================================================================

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Add markers for test categorization
markers =
    unit: Unit tests (fast, isolated, deterministic)
    integration: Integration tests (require Spark, slower)
    smoke: Smoke tests (critical path validation)
    cdc: CDC hash logic tests (highest risk)
    identity: Identity matching tests (highest risk)
    sector: Sector assignment tests (high risk)
    quarantine: Quarantine routing tests (medium risk)
    scd2: SCD2 key generation tests (high risk)
    manifest: Export bundle manifest tests (medium risk)
    slow: Tests that take >1 second
    spark: Tests that require Spark session

# Console output configuration
console_output_style = progress
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    --color=yes
    --code-highlight=yes

# Coverage configuration (if pytest-cov is installed)
# Uncomment to enable coverage reporting
# addopts = 
#     --cov=LMIP
#     --cov-report=html
#     --cov-report=term-missing
#     --cov-fail-under=80

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] [%(filename)s:%(lineno)d] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Performance
timeout = 300  # 5 minutes per test (requires pytest-timeout)
timeout_method = thread

# Fail fast (stop on first failure) - useful for development
# Uncomment to enable:
# addopts = -x

# Parallel execution (requires pytest-xdist)
# Uncomment to enable:
# addopts = -n auto

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning

# Minimum Python version
minversion = 3.10

# ============================================================================
# Test Execution Order (Priority-based)
# ============================================================================
# Run tests in priority order:
# 1. CDC hash logic (highest risk)
# 2. Identity matching (highest risk)
# 3. Sector assignment (high risk)
# 4. SCD2 key generation (high risk)
# 5. Quarantine routing (medium risk)
# 6. Export bundle manifest (medium risk)
#
# To run by priority:
# pytest -m "cdc or identity"  # Highest risk tests only
# pytest -m "cdc or identity or sector or scd2"  # High risk tests
# pytest -m "unit"  # Fast unit tests only
# pytest -m "integration"  # Integration tests only
# ============================================================================
