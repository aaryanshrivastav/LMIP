# LMIP Data Ingestion Workflow
# Job ID: 1013392226500135
# Exported: 2026-06-06

name: LMIPDataIngestion

# Trigger Configuration
trigger:
  pause_status: UNPAUSED
  periodic:
    interval: 1
    unit: HOURS

# Job Settings
max_concurrent_runs: 1
format: MULTI_TASK
timeout_seconds: 0
queue:
  enabled: true

# Performance
performance_target: PERFORMANCE_OPTIMIZED

# Environment
environments:
  - environment_key: Default
    spec:
      environment_version: "5"

# Task Pipeline
tasks:
  # Parallel Ingestion Tasks
  - task_key: Arbeit_Ingestor
    run_if: ALL_SUCCESS
    notebook_task:
      notebook_path: /Workspace/Users/aaryan.shrivastav1403@gmail.com/LMIP/notebooks/ingestion/ingest_arbeitnow
      source: WORKSPACE
    environment_key: Default
    timeout_seconds: 0
    disabled: false

  - task_key: Remotive_Ingestor
    run_if: ALL_SUCCESS
    notebook_task:
      notebook_path: /Workspace/Users/aaryan.shrivastav1403@gmail.com/LMIP/notebooks/ingestion/ingest_remotive
      source: WORKSPACE
    environment_key: Default
    timeout_seconds: 0
    disabled: false

  # Bronze Layer Processing
  - task_key: API_Log
    depends_on:
      - task_key: Arbeit_Ingestor
      - task_key: Remotive_Ingestor
    run_if: ALL_SUCCESS
    notebook_task:
      notebook_path: /Workspace/Users/aaryan.shrivastav1403@gmail.com/LMIP/notebooks/bronze/bronze_write_api_response_log
      base_parameters:
        catalog: workspace
        schema: bronze
      source: WORKSPACE
    environment_key: Default
    timeout_seconds: 0
    disabled: false

  - task_key: Job_Snapshot
    depends_on:
      - task_key: API_Log
    run_if: ALL_SUCCESS
    notebook_task:
      notebook_path: /Workspace/Users/aaryan.shrivastav1403@gmail.com/LMIP/notebooks/bronze/bronze_write_job_snapshot
      base_parameters:
        catalog: workspace
        schema: bronze
      source: WORKSPACE
    environment_key: Default
    timeout_seconds: 0
    disabled: false

  - task_key: Dedupe_Check
    depends_on:
      - task_key: Job_Snapshot
    run_if: ALL_SUCCESS
    notebook_task:
      notebook_path: /Workspace/Users/aaryan.shrivastav1403@gmail.com/LMIP/notebooks/bronze/bronze_dedupe_raw_payload
      base_parameters:
        catalog: workspace
        schema: bronze
      source: WORKSPACE
    environment_key: Default
    timeout_seconds: 0
    disabled: false

  - task_key: Finalise_Batch
    depends_on:
      - task_key: Dedupe_Check
    run_if: ALL_SUCCESS
    notebook_task:
      notebook_path: /Workspace/Users/aaryan.shrivastav1403@gmail.com/LMIP/notebooks/bronze/bronze_finalize_batch
      base_parameters:
        catalog: workspace
        schema: bronze
      source: WORKSPACE
    environment_key: Default
    timeout_seconds: 0
    disabled: false

# Workflow Architecture:
# 1. Parallel Ingestion: Arbeit_Ingestor + Remotive_Ingestor
# 2. API Logging: API_Log (waits for both ingestors)
# 3. Job Snapshot: Job_Snapshot (records job metadata)
# 4. Deduplication: Dedupe_Check (identifies duplicates)
# 5. Finalization: Finalise_Batch (marks batch complete)
#
# Batch ID Consistency:
# - Ingestion tasks generate batch_id once
# - All downstream tasks reuse the same batch_id
# - Ensures complete lineage traceability