table_name: workspace.bronze.bronze_job_snapshot
layer: bronze
description: Immutable snapshots of Bronze ingestion job executions. Captures job metadata for audit trail.
primary_key:
  - snapshot_id
business_keys:
  - job_id
  - batch_id
  - run_id
columns:
  - name: snapshot_id
    type: STRING
    nullable: false
    description: Unique snapshot identifier (UUID)
  - name: job_id
    type: STRING
    nullable: false
    description: Databricks job identifier
  - name: job_name
    type: STRING
    nullable: true
    description: Job name for human readability
  - name: batch_id
    type: STRING
    nullable: false
    description: Batch processing identifier
  - name: run_id
    type: STRING
    nullable: true
    description: Databricks job run identifier
  - name: status
    type: STRING
    nullable: false
    description: Job execution status (running, success, failed, partial)
  - name: config_json
    type: STRING
    nullable: true
    description: Job configuration as JSON string
  - name: snapshot_timestamp
    type: TIMESTAMP
    nullable: false
    description: When the snapshot was captured (UTC)
  - name: ingestion_timestamp
    type: TIMESTAMP
    nullable: false
    description: When record was ingested to table (UTC)
partitioning:
  type: date
  columns:
    - ingestion_timestamp
quality_rules:
  - rule: not_null
    columns:
      - snapshot_id
      - job_id
      - batch_id
      - status
  - rule: unique
    columns:
      - snapshot_id
  - rule: valid_enum
    column: status
    values:
      - running
      - success
      - failed
      - partial
lineage_inputs: []
lineage_outputs:
  - workspace.audit.audit_pipeline_runs
